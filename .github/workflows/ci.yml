name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npx eslint src/ --max-warnings 0 || echo "::warning::lint has pre-existing warnings (D-1 audit)"
        continue-on-error: true

      - name: Unit tests
        run: npm test

      - name: Build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PROJECT_ID: example
          VITE_SUPABASE_PUBLISHABLE_KEY: example-key
        run: npm run build

      - name: Verify migrations are valid SQL
        run: |
          for f in supabase/migrations/*.sql; do
            if [ -f "$f" ]; then
              python3 -c "
import sys
content = open('$f').read()
# Basic check: BEGIN/COMMIT balance
if content.count('BEGIN;') != content.count('COMMIT;'):
    print(f'$f: BEGIN/COMMIT mismatch')
    sys.exit(1)
"
            fi
          done
